# ===== Servidor =====
server.port=${SERVER_PORT:8080}

# ===== PostgreSQL (perfil Docker) =====
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres-db:5432/smartdisaster}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:smartuser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:smartpass123}

# ===== HikariCP =====
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=3
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ===== JPA / PostgreSQL =====
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ===== H2 Console desabilitado =====
spring.h2.console.enabled=false

# ===== JWT =====
jwt.secret=${JWT_SECRET:U21hcnREaXNhc3RlckpXVFNlY3JldEtleUZpYXAyMDI0U2VjdXJpdHlLZXk=}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ===== Swagger / OpenAPI =====
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true

# ===== Jackson =====
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null
